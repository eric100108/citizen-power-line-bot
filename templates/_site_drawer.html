  .cp-drawer {
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 901;
    width: min(380px, 88vw);
    padding: 28px 26px;
    background:
      radial-gradient(circle at 80% 10%, rgba(54, 202, 122, .18), transparent 28%),
      linear-gradient(180deg, rgba(8, 61, 76, .98) 0%, rgba(11, 91, 109, .98) 100%);

  body.cp-drawer-open {
    overflow: hidden;
  }
  body.cp-drawer-open .cp-drawer-scrim {
    opacity: 1;

  }
  body.cp-drawer-open .cp-drawer {

  .cp-drawer-link:hover {

    border-color: rgba(255,255,255,.24);
  }

    border-color: rgba(121, 226, 150, .46);
  }
  .cp-drawer-link strong {
    display: block;

  .cp-drawer-link span {

      width: 38px !important;

    .cp-drawer,

<div class="cp-drawer-scrim" onclick="cpCloseDrawer()" aria-hidden="true"></div>
<aside class="cp-drawer" id="cp-site-drawer" aria-label="頁面切換" aria-hidden="true">
  <div class="cp-drawer-head">
    <div>
      <span class="cp-drawer-kicker">導覽</span>
      <h2 class="cp-drawer-title">頁面切換</h2>
    </div>
    <button class="cp-drawer-close" type="button" onclick="cpCloseDrawer()" aria-label="關閉導覽">×</button>
  </div>
  <nav class="cp-drawer-nav">
    <a class="cp-drawer-link primary" href="/menu">
      <strong>首頁</strong>
      <span>平台入口與主要功能切換。</span>
    </a>
    <a class="cp-drawer-link" href="/site-estimate">
      <strong>官方案場估算</strong>
      <span>容量、板數、FIT 收益、補助與減碳。</span>
    </a>
    <a class="cp-drawer-link" href="/calc?amount=10000">
      <strong>投資試算</strong>
      <span>投入金額、參與位置與參考收益。</span>
    </a>
    <a class="cp-drawer-link" href="/project">
      <strong>南寮案例</strong>
      <span>案例背景、里程碑與可複製經驗。</span>
    </a>
    <a class="cp-drawer-link" href="/progress">
      <strong>SOP 進度對位</strong>
      <span>查看目前步驟與下一步建議。</span>
    </a>
    <a class="cp-drawer-link" href="/faq">
      <strong>FAQ</strong>
      <span>補助、場址、建立流程與常見問題。</span>
    </a>
  </nav>
  <div class="cp-drawer-foot">公民電廠陪伴式平台，把官方試算、案例經驗與 SOP 推進集中在同一個入口。</div>
</aside>

<script>
  function cpOpenDrawer() {
    document.body.classList.add("cp-drawer-open");
    const drawer = document.getElementById("cp-site-drawer");
    if (drawer) {
      drawer.setAttribute("aria-hidden", "false");
    }
  }
  function cpCloseDrawer() {
    document.body.classList.remove("cp-drawer-open");
    const drawer = document.getElementById("cp-site-drawer");
    if (drawer) {
      drawer.setAttribute("aria-hidden", "true");
    }
  }
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
      cpCloseDrawer();
    }
  });
</script>

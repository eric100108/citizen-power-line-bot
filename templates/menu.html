<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>市民電廠服務首頁</title>
  <style>
    :root {
      --bg: #eef3f1;
      --surface: #ffffff;
      --text-main: #1f2a24;
      --text-sub: #5f6f66;
      --brand-1: #06c755;
      --brand-2: #26a96c;
      --shadow: 0 16px 40px rgba(19, 52, 36, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 16px 40px;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top, rgba(6, 199, 85, 0.16), transparent 32%),
        linear-gradient(180deg, #f8fbf9 0%, var(--bg) 100%);
      color: var(--text-main);
    }

    .page-shell {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .phone-shell {
      width: 100%;
    }

    .app {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 32px;
      padding: 18px;
      box-shadow: 0 24px 60px rgba(17, 47, 32, 0.12);
      backdrop-filter: blur(10px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 28px 24px 98px;
      background: linear-gradient(135deg, var(--brand-1), #39d98a 55%, var(--brand-2));
      color: #ffffff;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      bottom: -52px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .hero h1 {
      margin: 16px 0 10px;
      font-size: 30px;
      line-height: 1.25;
    }

    .hero p {
      margin: 0;
      max-width: 320px;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.92);
    }

    .hero-note {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
      font-size: 13px;
    }

    .hero-note strong {
      display: block;
      margin-bottom: 2px;
      font-size: 14px;
    }

    .hero-layout {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    .hero-stats {
      display: grid;
      gap: 12px;
    }

    .hero-stat {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .hero-stat span {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      opacity: 0.9;
    }

    .hero-stat strong {
      font-size: 18px;
      line-height: 1.3;
    }

    .quick-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: -26px 10px 8px;
      position: relative;
      z-index: 2;
    }

    .quick-pill {
      padding: 12px 10px;
      border-radius: 18px;
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(223, 231, 226, 0.9);
      box-shadow: 0 14px 30px rgba(19, 52, 36, 0.1);
      font-size: 13px;
      color: var(--text-main);
    }

    .quick-pill strong {
      display: block;
      margin-top: 3px;
      font-size: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 6px 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-title span {
      font-size: 13px;
      color: var(--text-sub);
    }

    .card-list {
      display: grid;
      gap: 14px;
    }

    .feature-card {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 18px 16px 18px 18px;
      color: inherit;
      box-shadow: var(--shadow);
      border: 1px solid rgba(223, 231, 226, 0.9);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .feature-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(19, 52, 36, 0.16);
    }

    .icon-wrap {
      flex: 0 0 58px;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      font-size: 28px;
      background: linear-gradient(180deg, #f1fff7, #dcf7e7);
    }

    .feature-card:nth-child(2) .icon-wrap {
      background: linear-gradient(180deg, #fff9ea, #ffefbf);
    }

    .feature-card:nth-child(3) .icon-wrap {
      background: linear-gradient(180deg, #eef7ff, #d6e9ff);
    }

    .feature-content {
      flex: 1;
      min-width: 0;
    }

    .feature-content h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .feature-content p {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sub);
    }

    .feature-arrow {
      font-size: 18px;
      color: #9ab1a4;
    }

    .feature-meta {
      margin-top: 10px;
      font-size: 12px;
      color: #7b8f84;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #7a8a81;
    }

    @media (min-width: 640px) {
      body {
        padding: 32px 20px 48px;
      }

      .app {
        padding: 22px;
      }

      .hero p {
        max-width: 420px;
      }

      .quick-strip {
        margin-left: 14px;
        margin-right: 14px;
      }

      .card-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .feature-card:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (min-width: 980px) {
      body {
        padding: 20px 16px 36px;
      }

      .app {
        padding: 24px;
        border-radius: 28px;
      }

      .hero {
        padding: 34px 34px 118px;
      }

      .hero-layout {
        grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
      }

      .hero h1 {
        font-size: 42px;
      }

      .hero p {
        max-width: 560px;
        font-size: 16px;
      }

      .hero-note {
        left: 34px;
        right: 34px;
      }

      .quick-strip {
        margin: -34px 10px 10px;
      }

      .section-title {
        margin-top: 30px;
        margin-bottom: 18px;
      }

      .section-title h2 {
        font-size: 24px;
      }

      .card-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .feature-card,
      .feature-card:last-child {
        grid-column: auto;
      }

      .feature-card {
        align-items: flex-start;
        min-height: 210px;
      }

      .icon-wrap {
        width: 64px;
        height: 64px;
        flex-basis: 64px;
        font-size: 30px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 12px 28px;
      }

      .app {
        border-radius: 24px;
        padding: 14px;
      }

      .hero {
        padding: 24px 20px 84px;
      }

      .hero h1 {
        font-size: 27px;
      }

      .hero-note {
        left: 20px;
        right: 20px;
        bottom: 16px;
      }

      .hero-note div:last-child {
        display: none;
      }

      .quick-strip {
        gap: 8px;
        margin-left: 0;
        margin-right: 0;
      }

      .quick-pill {
        border-radius: 16px;
        padding: 10px 8px;
        font-size: 12px;
      }

      .hero-stats {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="phone-shell">
      <section class="app">
        <header class="hero">
          <div class="hero-layout">
            <div>
              <div class="hero-badge">LINE 官方帳號服務</div>
              <h1>市民電廠服務首頁</h1>
              <p>快速找到你需要的資訊，從常見問題到投資試算，再到案場進度，一頁就能完成。</p>
            </div>
            <div class="hero-stats" aria-label="服務摘要">
              <div class="hero-stat">
                <span>常用服務</span>
                <strong>FAQ、試算、進度</strong>
              </div>
              <div class="hero-stat">
                <span>使用方式</span>
                <strong>點選卡片快速進入</strong>
              </div>
            </div>
          </div>
          <div class="hero-note">
            <div>
              <strong>今天想先看哪一項？</strong>
              點選下方卡片，立即進入服務功能
            </div>
            <div>📱</div>
          </div>
        </header>

        <section class="quick-strip" aria-label="快速入口">
          <div class="quick-pill">💬<strong>FAQ</strong></div>
          <div class="quick-pill">📈<strong>試算</strong></div>
          <div class="quick-pill">🏗️<strong>進度</strong></div>
        </section>

        <div class="section-title">
          <h2>主要功能</h2>
          <span>3 項服務</span>
        </div>

        <section class="card-list">
          <a class="feature-card" href="/faq?keyword=市民電廠">
            <div class="icon-wrap">💬</div>
            <div class="feature-content">
              <h3>常見問題</h3>
              <p>快速查詢加入方式、收益說明與常見申辦流程。</p>
              <div class="feature-meta">常用查詢</div>
            </div>
            <div class="feature-arrow">›</div>
          </a>

          <a class="feature-card" href="/calc?amount=10000">
            <div class="icon-wrap">📈</div>
            <div class="feature-content">
              <h3>投資試算</h3>
              <p>輸入金額立即估算投資報酬，幫你掌握參與門檻。</p>
              <div class="feature-meta">即時計算</div>
            </div>
            <div class="feature-arrow">›</div>
          </a>

          <a class="feature-card" href="/progress">
            <div class="icon-wrap">🏗️</div>
            <div class="feature-content">
              <h3>案場進度</h3>
              <p>查看目前建置狀態、施工節點與最新專案更新。</p>
              <div class="feature-meta">最新狀態</div>
            </div>
            <div class="feature-arrow">›</div>
          </a>
        </section>

        <div class="footer">Citizen Power MVP</div>
      </section>
    </section>
  </main>
</body>
</html>

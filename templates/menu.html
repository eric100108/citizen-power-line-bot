<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公民電廠服務首頁</title>
  <style>
    :root {
      --bg: #eef3f1;
      --surface: #ffffff;
      --text-main: #1f2a24;
      --text-sub: #5f6f66;
      --brand-1: #06c755;
      --brand-2: #26a96c;
      --shadow: 0 16px 40px rgba(19, 52, 36, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px 12px 28px;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top, rgba(6, 199, 85, 0.16), transparent 32%),
        linear-gradient(180deg, #f8fbf9 0%, var(--bg) 100%);
      color: var(--text-main);
    }

    .page-shell {
      width: 100%;
      margin: 0 auto;
    }

    .app {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 24px 60px rgba(17, 47, 32, 0.12);
      backdrop-filter: blur(10px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 24px 20px 92px;
      background: linear-gradient(135deg, var(--brand-1), #39d98a 55%, var(--brand-2));
      color: #ffffff;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -42px;
      bottom: -56px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .hero-layout {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .hero h1 {
      margin: 16px 0 10px;
      font-size: 30px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      max-width: 560px;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.92);
    }

    .hero-stats {
      display: none;
      gap: 12px;
    }

    .hero-stat {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .hero-stat span {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      opacity: 0.9;
    }

    .hero-stat strong {
      font-size: 18px;
      line-height: 1.3;
    }

    .hero-note {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
      font-size: 13px;
    }

    .hero-note strong {
      display: block;
      margin-bottom: 2px;
      font-size: 14px;
    }

    .quick-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: -24px 0 10px;
      position: relative;
      z-index: 2;
    }

    .quick-pill {
      padding: 12px 10px;
      border-radius: 18px;
      text-align: center;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(223, 231, 226, 0.9);
      box-shadow: 0 14px 30px rgba(19, 52, 36, 0.1);
      font-size: 13px;
      color: var(--text-main);
      text-decoration: none;
    }

    .quick-pill strong {
      display: block;
      margin-top: 3px;
      font-size: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 6px 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-title span {
      font-size: 13px;
      color: var(--text-sub);
    }

    .card-list {
      display: grid;
      gap: 14px;
    }

    .feature-card {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 18px;
      color: inherit;
      box-shadow: var(--shadow);
      border: 1px solid rgba(223, 231, 226, 0.9);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .feature-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(19, 52, 36, 0.16);
    }

    .icon-wrap {
      flex: 0 0 58px;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      font-size: 28px;
      background: linear-gradient(180deg, #fff9ea, #ffefbf);
    }

    .feature-card:nth-child(2) .icon-wrap {
      background: linear-gradient(180deg, #eef7ff, #d6e9ff);
    }

    .feature-content {
      flex: 1;
      min-width: 0;
    }

    .feature-content h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .feature-content p {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sub);
    }

    .feature-meta {
      margin-top: 10px;
      font-size: 12px;
      color: #7b8f84;
    }

    .feature-arrow {
      font-size: 18px;
      color: #9ab1a4;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #7a8a81;
    }

    @media (min-width: 760px) {
      body {
        padding: 20px 16px 32px;
      }

      .app {
        padding: 24px;
      }

      .hero {
        padding: 30px 28px 100px;
      }

      .hero-layout {
        grid-template-columns: minmax(0, 1.2fr) minmax(220px, 0.8fr);
      }

      .hero-stats {
        display: grid;
      }

      .hero h1 {
        font-size: 42px;
      }

      .hero-note {
        left: 28px;
        right: 28px;
      }

      .quick-strip {
        margin: -28px 8px 14px;
      }

      .section-title h2 {
        font-size: 24px;
      }

      .card-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="app">
      <header class="hero">
        <div class="hero-layout">
          <div>
            <div class="hero-badge">LINE 官方帳號服務</div>
            <h1>公民電廠服務首頁</h1>
            <p>快速找到你需要的資訊，直接使用投資試算與案場進度功能，掌握參與門檻與最新專案狀態。</p>
          </div>
          <div class="hero-stats" aria-label="服務摘要">
            <div class="hero-stat">
              <span>可用功能</span>
              <strong>投資試算、案場進度</strong>
            </div>
            <div class="hero-stat">
              <span>使用方式</span>
              <strong>點選卡片快速進入</strong>
            </div>
          </div>
        </div>
        <div class="hero-note">
          <strong>從兩個主要功能開始</strong>
          依照你現在想了解的內容，直接選擇下方服務入口。
        </div>
      </header>

      <section class="quick-strip" aria-label="快速入口">
        <a class="quick-pill" href="/calc?amount=10000">📈<strong>試算</strong></a>
        <a class="quick-pill" href="/progress">🏗️<strong>進度</strong></a>
      </section>

      <div class="section-title">
        <h2>主要功能</h2>
        <span>2 項服務</span>
      </div>

      <section class="card-list">
        <a class="feature-card" href="/calc?amount=10000">
          <div class="icon-wrap">📈</div>
          <div class="feature-content">
            <h3>投資試算</h3>
            <p>輸入金額後立即查看預估收益，快速掌握參與門檻與回報。</p>
            <div class="feature-meta">即時計算</div>
          </div>
          <div class="feature-arrow">›</div>
        </a>

        <a class="feature-card" href="/progress">
          <div class="icon-wrap">🏗️</div>
          <div class="feature-content">
            <h3>案場進度</h3>
            <p>查看目前案場建置狀態、最新更新日期與進行中的階段。</p>
            <div class="feature-meta">最新狀態</div>
          </div>
          <div class="feature-arrow">›</div>
        </a>
      </section>

      <div class="footer">Citizen Power MVP</div>
    </section>
  </main>
</body>
</html>
